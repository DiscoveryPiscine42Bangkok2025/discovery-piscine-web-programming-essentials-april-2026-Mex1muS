<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>

    <form>
        <label>First num:</label>
        <input type="text" id="fnum"><br><br>

        <label>Calc:</label>
        <select id="calc">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select><br><br>

        <label>Last num:</label>
        <input type="text" id="lnum"><br><br>

        <input type="button" value="Try me!" onclick="calculate()">
    </form>

    <script>
        function calculate() {
            let n1 = parseInt(document.getElementById("fnum").value);
            let n2 = parseInt(document.getElementById("lnum").value);
            let op = document.getElementById("calc").value;
            let result;

            if (
                isNaN(n1) || 
                isNaN(n2) || 
                n1 < 0 || 
                n2 < 0
            ) {
                alert("Error :(");
                return;
            }

            if ((op === "/" || op === "%") && n2 === 0) {
                alert("It’s over 9000!");
                console.log("It’s over 9000!");
                return;
            }

            if (op === "+") {
                result = n1 + n2;
            } else if (op === "-") {
                result = n1 - n2;
            } else if (op === "*") {
                result = n1 * n2;
            } else if (op === "/") {
                result = n1 / n2;
            } else if (op === "%") {
                result = n1 % n2;
            }

            alert(result);
            console.log(result);
        }

        setInterval(function () {
            alert("Please, use me...");
        }, 30000);
    </script>
</body>
</html>
